name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: "mysql://logistics:logistics123@127.0.0.1:3306/logisense_test_db"
  JWT_ACCESS_SECRET: "ci-access-secret"
  JWT_REFRESH_SECRET: "ci-refresh-secret"
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: logisense_test_db
          MYSQL_USER: logistics
          MYSQL_PASSWORD: logistics123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests + coverage (apps/api, mínimo 70%)
        run: pnpm --filter @logisense/api test:cov

      - name: Integration tests (apps/api)
        run: pnpm --filter @logisense/api test:integration

      - name: E2E tests (apps/api)
        run: pnpm --filter @logisense/api test:e2e

      - name: Frontend tests (apps/web)
        run: pnpm --filter @logisense/web test

      - name: Build
        run: pnpm build

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy api (staging)
        run: railway up --service api --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy web (staging)
        run: railway up --service web --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Ambiente "production" no GitHub tem required reviewers configurados
    # (Settings > Environments) — o job fica pendente até alguém aprovar,
    # funcionando como o gate manual staging -> produção.
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy api (production)
        run: railway up --service api --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy web (production)
        run: railway up --service web --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
